name: Build riscv64 wheel

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Upstream release tag to build from (e.g. v0.5.3)'
        required: false
        type: string
  schedule:
    - cron: '0 2 * * 0'

jobs:
  build:
    runs-on: ubuntu-24.04-riscv
    timeout-minutes: 120
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag || github.ref }}
          fetch-depth: 0

      # Build on the RISE ubuntu-24.04-riscv runner with uv, matching the
      # working httptools build. The self-hosted F3 board caused weekly
      # runner-contention failures, and its bare python3 is absent on RISE
      # runners - uv provisions a managed riscv64 Python instead.
      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Build wheel
        run: |
          uv venv --python 3.12 /tmp/build-venv
          . /tmp/build-venv/bin/activate
          uv pip install --upgrade maturin
          maturin build --release --out /tmp/wheels/ --manifest-path bindings/python/Cargo.toml

      - name: Verify platform tag
        run: |
          ls /tmp/wheels/*.whl
          for whl in /tmp/wheels/*.whl; do
            if echo "$whl" | grep -q "linux_riscv64\|manylinux.*riscv64"; then
              echo "OK: $whl"
            else
              echo "FAIL: $whl does not have riscv64 platform tag"
              exit 1
            fi
          done

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-riscv64
          path: /tmp/wheels/*.whl
          retention-days: 90

      - name: Cleanup
        if: always()
        run: rm -rf /tmp/build-venv /tmp/wheels

  release:
    needs: build
    runs-on: ubuntu-latest
    if: success()
    env:
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: wheel-riscv64
          path: /tmp/wheels/

      - name: Get wheel info
        id: wheel_info
        run: |
          WHL=$(ls /tmp/wheels/*.whl | head -1)
          BASENAME=$(basename "$WHL")
          # Extract version from wheel filename: name-version-cpXX-...
          VERSION=$(echo "$BASENAME" | sed 's/^[^-]*-\([^-]*\)-.*/\1/')
          echo "whl_path=$WHL" >> "$GITHUB_OUTPUT"
          echo "whl_name=$BASENAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate checksums
        run: |
          cd /tmp/wheels
          sha256sum *.whl > SHA256SUMS

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="riscv64-v${{ steps.wheel_info.outputs.version }}"
          TITLE="riscv64 wheel v${{ steps.wheel_info.outputs.version }}"

          # Delete existing release with same tag if it exists
          gh release delete "$TAG" --yes 2>/dev/null || true
          git tag -d "$TAG" 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true

          # Create new release
          gh release create "$TAG" \
            --title "$TITLE" \
            --notes "Prebuilt riscv64 wheel for Linux.

          Built on: RISE riscv64 runner (ubuntu-24.04-riscv)
          Wheel: ${{ steps.wheel_info.outputs.whl_name }}

          Install:
          \`\`\`
          pip install safetensors --find-links https://github.com/gounthar/safetensors/releases/download/$TAG/
          \`\`\`" \
            /tmp/wheels/*.whl \
            /tmp/wheels/SHA256SUMS

      - name: Cleanup
        if: always()
        run: rm -rf /tmp/wheels
  notify-index:
    needs: release
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Trigger index update
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: |
          gh api repos/gounthar/riscv64-python-wheels/dispatches \
            -f event_type=fork-release-published \
            -f "client_payload[repo]=${{ github.repository }}" \
            -f "client_payload[tag]=${{ github.ref_name }}"
